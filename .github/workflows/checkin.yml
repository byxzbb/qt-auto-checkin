name: 晴辰云自动签到
on:
  # 定时任务：每天UTC时间0点执行，对应北京时间8点，和脚本默认的签到时间一致
  # 如果你想要修改时间，可以调整这个cron表达式，比如想要每天9点，就是0 1 * * *
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发，你可以在github仓库的Actions里手动点击运行
  workflow_dispatch:

jobs:
  auto_checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright schedule
          playwright install chromium --no-shell
      
      - name: 执行签到
        env:
          # 从仓库的Secret里读取你的API Key，不会泄露
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # 把你的API Key填入到脚本里
          sed -i "s/API_KEY = .*/API_KEY = \"$API_KEY\"/" auto_checkin.py
          # 运行签到脚本
          python3 auto_checkin.py
