name: 晴辰云自动签到
on:
  # 定时任务：每天UTC时间0点执行，对应北京时间8点
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto_checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          # 用国内清华镜像源，速度快不卡住
          python -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests schedule beautifulsoup4 -i https://pypi.tuna.tsinghua.edu.cn/simple
      
      - name: 执行签到
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          sed -i "s/API_KEY = .*/API_KEY = \"$API_KEY\"/" auto_checkin.py
          python3 auto_checkin.py
